name: Vigía de informes trimestrales
# Cada lunes calcula qué empresas de la cartera publican resultados esta semana
# y si hay monitores trimestrales vencidos, y deja el resultado en buzon/vigia.json
# (lo lee el botón "Buzón del lunes" de la app). Determinista, sin IA.
# Se puede lanzar a mano con "Run workflow".
on:
  workflow_dispatch: {}
  schedule:
    - cron: "15 6 * * 1"   # lunes 06:15 UTC (~08:15 Madrid)
permissions: { contents: write }
# Serializa agenda/vigía/fundamentales: nunca pushean a la vez -> sin conflictos en buzon/index.json.
concurrency:
  group: buzon-commit
  cancel-in-progress: false
jobs:
  vigia:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - run: python vigia.py
      - name: Commit y push (con reintentos ante colisiones)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add buzon/vigia.json buzon/index.json
          if git diff --staged --quiet; then
            echo "Sin cambios en el buzón"; exit 0
          fi
          git commit -m "Vigía: buzón del lunes"
          for i in 1 2 3 4 5; do
            if git pull --rebase --autostash origin main && git push origin main; then
              echo "Push OK en el intento $i"; exit 0
            fi
            git rebase --abort 2>/dev/null || true
            echo "Push rechazado, reintento $i..."; sleep 5
          done
          echo "No se pudo hacer push tras 5 intentos"; exit 1
