name: Actualizar fundamentales
# Solo manual (boton "Run workflow"): los fundamentales cambian despacio y asi
# no se piden datos a Yahoo a diario. Alternativa: el .bat local de la misma carpeta.
on: { workflow_dispatch: {} }
permissions: { contents: write }
jobs:
  fundamentales:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install yfinance pandas
      - run: python actualizar_fundamentales.py
      - run: git config user.name "github-actions[bot]" && git config user.email "github-actions[bot]@users.noreply.github.com" && git add fundamentales.json && (git diff --staged --quiet || git commit -m "Fundamentales") && git push
