name: Actualizar fundamentales
# Solo manual (boton "Run workflow"): los fundamentales cambian despacio y asi
# no se piden datos a Yahoo a diario. Alternativa: el .bat local de la misma carpeta.
on: { workflow_dispatch: {} }
permissions: { contents: write }
jobs:
  fundamentales:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install yfinance pandas
      - run: python actualizar_fundamentales.py
      - name: Commit y push (con reintentos ante colisiones)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fundamentales.json
          if git diff --staged --quiet; then
            echo "Sin cambios en fundamentales.json"; exit 0
          fi
          git commit -m "Fundamentales"
          for i in 1 2 3 4 5; do
            if git pull --rebase --autostash origin main && git push origin main; then
              echo "Push OK en el intento $i"; exit 0
            fi
            echo "Push rechazado (colision), reintento $i..."; sleep 5
          done
          echo "No se pudo hacer push tras 5 intentos"; exit 1
