name: Agenda confirmada (buzón)
# Trae de Yahoo las fechas CONFIRMADAS de resultados y ex-dividend y las deja en
# buzon/agenda.json. Compañero del Vigía (que ESTIMA); aquí se confirma.
# Lunes 06:15 UTC. El grupo de concurrencia (abajo) serializa esta tarea con el
# Vigía y Fundamentales para que nunca colisionen al escribir buzon/index.json.
on:
  schedule:
    - cron: "15 6 * * 1"
  workflow_dispatch: {}
permissions: { contents: write }
# Serializa agenda/vigía/fundamentales: nunca pushean a la vez -> sin conflictos en buzon/index.json.
concurrency:
  group: buzon-commit
  cancel-in-progress: false
jobs:
  agenda:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - run: pip install yfinance pandas
      - run: python agenda.py
      - name: Commit y push (con reintentos ante colisiones)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add buzon/agenda.json buzon/index.json
          if git diff --staged --quiet; then
            echo "Sin cambios en la agenda"; exit 0
          fi
          git commit -m "Agenda confirmada (buzón)"
          for i in 1 2 3 4 5; do
            if git pull --rebase --autostash origin main && git push origin main; then
              echo "Push OK en el intento $i"; exit 0
            fi
            git rebase --abort 2>/dev/null || true
            echo "Push rechazado, reintento $i..."; sleep 5
          done
          echo "No se pudo hacer push tras 5 intentos"; exit 1
