name: Agenda confirmada (buzón)
# Trae de Yahoo las fechas CONFIRMADAS de resultados y ex-dividend y las deja en
# buzon/agenda.json. Compañero del Vigía (que ESTIMA); aquí se confirma.
# Lunes 06:15 UTC — separado a propósito del Vigía para no chocar al escribir
# buzon/index.json (cada tarea reescribe solo su propia entrada, pero si corrieran
# a la vez podrían colisionar en el push). Ajusta la hora si tu Vigía corre cerca.
on:
  schedule:
    - cron: "15 6 * * 1"
  workflow_dispatch: {}
permissions: { contents: write }
jobs:
  agenda:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install yfinance pandas
      - run: python agenda.py
      - name: Commit y push (con reintentos ante colisiones)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add buzon/agenda.json buzon/index.json
          if git diff --staged --quiet; then
            echo "Sin cambios en la agenda"; exit 0
          fi
          git commit -m "Agenda confirmada (buzón)"
          for i in 1 2 3 4 5; do
            if git pull --rebase --autostash origin main && git push origin main; then
              echo "Push OK en el intento $i"; exit 0
            fi
            echo "Push rechazado (colisión), reintento $i..."; sleep 5
          done
          echo "No se pudo hacer push tras 5 intentos"; exit 1
