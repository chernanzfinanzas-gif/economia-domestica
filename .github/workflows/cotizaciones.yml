
name: Actualizar cotizaciones

on:
  schedule:
    - cron: "0 18 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el repo
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install yfinance

      - name: Ejecutar el actualizador
        run: python actualizar_cotizaciones.py

      - name: Subir los cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add precios
          git diff --staged --quiet || git commit -m "Cotizaciones $(date +%F)"
          git push
