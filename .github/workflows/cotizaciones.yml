name: Actualizar cotizaciones
on: { workflow_dispatch: {}, schedule: [ { cron: "7 18 * * 1-5" }, { cron: "35 20 * * 1-5" }, { cron: "22 22 * * 1-5" } ] }
permissions: { contents: write }
jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install yfinance
      - run: python actualizar_cotizaciones.py
      - run: git config user.name "github-actions[bot]" && git config user.email "github-actions[bot]@users.noreply.github.com" && git add precios && (git diff --staged --quiet || git commit -m "Cotizaciones") && git push
